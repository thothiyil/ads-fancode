<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>FanCode Ads — Three Directions</title>
<link rel="stylesheet" href="tokens.css">
<style>
  html,body{margin:0;padding:0;background:#f0eee9;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden;height:100vh}
  #root{width:100vw;height:100vh}
  iframe{width:100%;height:100%;border:0;display:block;background:#000}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard, DCPostIt } = window;

  // Each direction renders its full landing page in an iframe. Width 1440 ×
  // height 4400ish — these are tall, scroll-y inside the artboard focus
  // overlay, but show full top in compact view.
  const ART_W = 1440;
  const ART_H = 3200;

  function App() {
    return (
      <DesignCanvas defaultZoom={0.32}>
        <DCSection id="intro" title="FanCode Ads — Three Directions" subtitle="Editorial · Premium · Cinematic. All three use FanCode tokens (Saira display, Roboto Flex, onyx neutrals, hot orange) but interpret them differently. Click an artboard to focus.">
          <DCPostIt>Click any artboard's expand icon to view fullscreen and scroll. ←/→ navigate, Esc closes.</DCPostIt>
        </DCSection>

        <DCSection id="options" title="The Three" subtitle="Drag to reorder · click label to rename">
          <DCArtboard id="broadcast" label="01 · The Broadcast" width={ART_W} height={ART_H}>
            <iframe src="artboards/01-broadcast.html" title="Broadcast"></iframe>
          </DCArtboard>
          <DCArtboard id="editorial" label="02 · The Editorial" width={ART_W} height={ART_H}>
            <iframe src="artboards/02-editorial.html" title="Editorial"></iframe>
          </DCArtboard>
          <DCArtboard id="datasheet" label="03 · The Datasheet" width={ART_W} height={ART_H}>
            <iframe src="artboards/03-datasheet.html" title="Datasheet"></iframe>
          </DCArtboard>
        </DCSection>

        <DCSection id="notes" title="Direction Notes">
          <DCPostIt>
            <strong>01 — Broadcast.</strong> Cinematic full-bleed stadium hero. EA Sports energy. Single oversized statement, ticker rule, hero footer, formats list. Most "stadium-night" of the three.
          </DCPostIt>
          <DCPostIt>
            <strong>02 — Editorial.</strong> Magazine cover & essay. Cream paper background, drop-cap opening, two-column body, pull quote, colophon-style CTA. Most premium, most slow.
          </DCPostIt>
          <DCPostIt>
            <strong>03 — Datasheet.</strong> WSC Sports clinical-data direction. Live ticker with scores, mono spec rows, hairline grid, SKU codes per format. Most data-driven.
          </DCPostIt>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
